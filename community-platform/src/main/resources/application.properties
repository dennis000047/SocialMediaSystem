# 修改後的連線字串
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=TestCommunityPlatform;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=sa
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 強制指定 Dialect 避免自動偵測失敗
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# 強制開啟彩色日誌輸出
spring.output.ansi.enabled=ALWAYS

# 設定日誌格式（讓 ERROR 等級的字體更顯眼）
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}

# 其他保持不變
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true